name: Claude Code Review

on:
  # Run on new PRs and updates
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Interactive Claude assistant - runs on all PRs
  claude-assistant:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          timeout_minutes: 30

  # Automatic code review on every PR
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude Auto Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          direct_prompt: |
            Review this PR for issues only. Check for:

            **Bugs & Logic Errors:**
            - Off-by-one errors, null/undefined handling
            - Race conditions, edge cases
            - Incorrect logic or assumptions

            **Security Issues:**
            - SQL injection, XSS, command injection
            - Authentication/authorization flaws
            - Sensitive data exposure
            - Insecure dependencies
            - OWASP Top 10 vulnerabilities

            **Code Quality:**
            - Obvious improvements or simplifications
            - Missing error handling
            - Performance concerns

            IMPORTANT: Only report issues found. Do not comment on what's good or working well.
            Do not praise the code. Do not say "LGTM" or similar positive feedback.
            If no issues are found, respond with exactly: "No issues found."
            Be concise and actionable - focus only on problems that need fixing.
          timeout_minutes: 20
