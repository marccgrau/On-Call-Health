name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build frontend Docker image
        run: docker build -t frontend-test ./frontend -f ./frontend/Dockerfile.dev

      - name: Verify Bun version
        run: |
          docker run --rm frontend-test bun --version

      - name: Test Next.js build
        run: docker run --rm frontend-test bun run build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend Docker image
        run: docker build -t backend-test ./backend

      - name: Verify Python version
        run: docker run --rm backend-test python --version

      - name: Verify dependencies installed
        run: docker run --rm backend-test pip check

      - name: Test FastAPI app imports
        run: docker run --rm -e DATABASE_URL=postgresql://test:test@localhost/test backend-test python -c "from app.main import app; print('FastAPI app loaded successfully')"

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done'

      - name: Check frontend is responding
        run: |
          timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done'

      - name: Check backend API is responding
        run: |
          timeout 90 bash -c 'until curl -s http://localhost:8000/health > /dev/null 2>&1; do echo "Waiting for backend..."; sleep 3; done'

      - name: Verify backend health endpoint
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Show container status
        if: failure()
        run: docker compose ps -a

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100
