name: Deploy MCP to ECS

on:
  push:
    branches: [main]
    paths:
      - 'backend/app/mcp/**'
      - 'backend/Dockerfile.mcp'
      - 'backend/requirements-mcp.txt'
      - 'infra/ecs/**'
      - '.github/workflows/deploy-mcp.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: on-call-health-mcp
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -f backend/Dockerfile.mcp -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG backend/
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Download current task definition
        continue-on-error: true
        run: |
          aws ecs describe-task-definition \
            --task-definition on-call-health-mcp \
            --query taskDefinition \
            > task-definition.json 2>/dev/null || true

      - name: Update task definition with new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: on-call-health-mcp
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Use existing task def if available, otherwise use template
          if [ ! -s task-definition.json ]; then
            sed -e "s/ACCOUNT_ID/${{ secrets.AWS_ACCOUNT_ID }}/g" \
                -e "s/REGION/${{ secrets.AWS_REGION }}/g" \
                infra/ecs/task-definition.json > task-definition.json
          fi

          # Update image in task definition
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          jq --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE' \
            task-definition.json > updated-task-definition.json

          # Remove fields that aren't needed for registration
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            updated-task-definition.json > task-def-register.json

      - name: Register new task definition
        id: task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def-register.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-def-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster on-call-health \
            --service mcp-server \
            --task-definition ${{ steps.task-def.outputs.task-def-arn }} \
            --force-new-deployment

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster on-call-health \
            --services mcp-server

      - name: Deployment status
        run: |
          echo "✅ MCP server deployed successfully to ECS"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/on-call-health-mcp:${{ github.sha }}"
